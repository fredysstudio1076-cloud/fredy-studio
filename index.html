<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500&family=Great+Vibes&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo">
      <span class="logo-main">Nova</span>
      <span class="logo-sub">Studio</span>
    </div>
    <div class="header-actions">
      <a href="https://wa.me/573151736313" target="_blank" class="btn-wa">WhatsApp</a>
      <a href="https://www.instagram.com/fredys_studio" target="_blank" class="btn-ig">Instagram</a>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-container">
      <div class="hero-content">
        <span class="hero-label">● Nueva colección disponible</span>
        <h1>Tu estilo, <br><em>tu historia.</em></h1>
        <p>Descubre nuestras nuevas prendas diseñadas para expresar tu personalidad única.</p>
      </div>
      <div class="hero-cards">
        <div class="hero-card" onclick="scrollAndFilter('dama')">
          <span class="emoji">👗</span>
          <p>Dama</p>
        </div>
        <div class="hero-card" onclick="scrollAndFilter('caballero')">
          <span class="emoji">👕</span>
          <p>Caballero</p>
        </div>
        <div class="hero-card" onclick="scrollAndFilter('unisex')">
          <span class="emoji">🧥</span>
          <p>Unisex</p>
        </div>
      </div>
    </div>
  </section>

  <!-- FILTROS -->
  <div class="filters">
    <button class="filter-btn active" onclick="filterProducts('todos', this)">Todos</button>
    <button class="filter-btn" onclick="filterProducts('dama', this)">Dama</button>
    <button class="filter-btn" onclick="filterProducts('caballero', this)">Caballero</button>
    <button class="filter-btn" onclick="filterProducts('unisex', this)">Unisex</button>
  </div>

  <!-- CATÁLOGO -->
  <div class="catalog" id="catalog">
    <!-- Las cards se generan desde app.js -->
  </div>

  <!-- FOOTER -->
  <footer>
    <p>© 2025 Nova Studio</p>
  </footer>

  <!-- MODAL -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <img class="modal-img" id="modalImg" src="" alt="">
      <div class="modal-body">
        <span class="modal-category" id="modalCategory"></span>
        <h2 class="modal-name" id="modalName"></h2>
        <p class="modal-desc" id="modalDesc"></p>
        <div class="modal-footer">
          <div class="modal-price" id="modalPrice"></div>
          <a class="buy-btn" id="modalBtn" href="#" target="_blank">Pedir por WhatsApp</a>
        </div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
