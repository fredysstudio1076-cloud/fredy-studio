<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fredy's Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo">Fredy's <span>Studio</span></div>
    <div class="header-actions">
      <a href="#" class="btn-wa">WhatsApp</a>
      <a href="#" class="btn-ig">Instagram</a>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-container">
      <div class="hero-content">
        <span class="hero-label">● Nueva colección disponible</span>
        <h1>Tu estilo, <br><em>tu historia.</em></h1>
        <p>Descubre nuestras nuevas prendas diseñadas para expresar tu personalidad única.</p>
      </div>
      <div class="hero-cards">
        <div class="hero-card">
          <span class="emoji">👗</span>
          <p>Dama</p>
        </div>
        <div class="hero-card">
          <span class="emoji">👕</span>
          <p>Caballero</p>
        </div>
        <div class="hero-card">
          <span class="emoji">🧥</span>
          <p>Unisex</p>
        </div>
      </div>
    </div>
  </section>

  <!-- FILTROS -->
  <div class="filters">
    <button class="filter-btn active" onclick="filterProducts('todos', this)">Todos</button>
    <button class="filter-btn" onclick="filterProducts('dama', this)">Dama</button>
    <button class="filter-btn" onclick="filterProducts('caballero', this)">Caballero</button>
    <button class="filter-btn" onclick="filterProducts('unisex', this)">Unisex</button>
  </div>

  <!-- CATÁLOGO -->
  <div class="catalog" id="catalog">
    <!-- Las cards se generan desde app.js -->
  </div>

  <!-- FOOTER -->
  <footer>
    <p>© 2025 Fredy's Studio</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
